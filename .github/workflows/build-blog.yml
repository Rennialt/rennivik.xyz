name: Build Blog Index

on:
  push:
    branches: [main]
    paths:
      - "blogs/**/index.md"
      - "scripts/build-blog.js"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-blog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build dependencies
        run: npm install --no-save gray-matter marked

      - name: Build posts.json
        run: node scripts/build-blog.js

      - name: Sync with remote before pushing
        run: git pull --rebase --autostash origin main

      - name: Commit updated posts.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild blogs/posts.json"
          file_pattern: blogs/posts.json