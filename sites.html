<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rennivik.xyz</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="icon" href="https://images.rennivik.xyz/icon.png" type="image/png">
</head>

<body>
    <div class="nav">
        <nav class="navbar">
            <a href="/index" class="logo">
                <img src="https://images.rennivik.xyz/icon.png" alt="rennivik.xyz">
            </a>

            <div class="nav-links">
                <a href="/index"><i class="fa-solid fa-house"></i>Home</a>
                <a href="/blogs"><i class="fa-solid fa-envelope"></i>Blog</a>
                <a id="active" href="/sites"><i class="fa-solid fa-globe"></i>Sites</a>
            </div>
        </nav>

        <hr>
    </div>


    <div class="content">
        <section class="site-list">
            <h1>My Sites</h1>
            <p class="subtitle">Projects and random things I've made.</p>

            <div class="sites">
                <div class="site-card">
                    <div>
                        <h2>Status</h2>
                        <p>A site to check the status of the RennAPI.</p>
                    </div>

                    <a href="https://status.rennivik.xyz" class="site-button">
                        Visit ↗
                    </a>
                </div>

                <div class="site-card">
                    <div>
                        <h2>Delta</h2>
                        <p>Fast and simple file sharing platform.</p>
                    </div>

                    <a href="https://delta.rennivik.xyz" class="site-button">
                        Visit ↗
                    </a>
                </div>


                <div class="site-card">
                    <div>
                        <h2>NeilVPN</h2>
                        <p>A joke website I made for fun :)</p>
                    </div>

                    <a href="https://neil.rennivik.xyz" class="site-button">
                        Visit ↗
                    </a>
                </div>

            </div>
        </section>
    </div>


    <div class="credits">
        <hr>
        <p>&copy; 2026 Rennivik. All rights reserved.</p>
    </div>


    <script>
        (async () => {
            if (!document.cookie.includes("rennguard_session=")) {
                window.location.href =
                    "https://auth.rennivik.xyz/rennivik.xyz?redirect=" +
                    encodeURIComponent(window.location.href);
            }
        })();
        
        window.addEventListener("scroll", () => {
            document.body.style.setProperty(
                "--scroll",
                `${window.scrollY * 0.05}px`
            );
        });
    </script>

</body>
</html>
